name: Update Release Notes

on:
  repository_dispatch:
    types: [update_release_notes]

permissions:
  contents: write

jobs:
  update-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Write release history
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: node scripts/write-release-note.mjs
      - name: Commit release history
        run: |
          git config user.name "OpenSlides Release Bot"
          git config user.email "openslides-release-bot@users.noreply.github.com"
          git add src/data/releases.json
          if git diff --cached --quiet; then
            echo "Release history already matches this release."
            exit 0
          fi
          git commit -m "chore: add release notes ${{ github.event.client_payload.version }}"
          git push
